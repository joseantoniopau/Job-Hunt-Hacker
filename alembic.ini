# Alembic config for Job Hunt Hacker.
#
# The runtime DB path is read from backend.app.config.settings.db_path
# inside alembic/env.py — this file only carries static knobs.

[alembic]
# Path to the migration scripts directory (relative to this file).
script_location = alembic

# Template used to render new revision scripts.
file_template = %%(rev)s_%%(slug)s

# Allow inline path tokens like %(here)s if we ever need them.
prepend_sys_path = .

# Timezone for new migration timestamps.
timezone = UTC

# Empty placeholder — env.py builds the real URL from settings.db_path,
# but Alembic refuses to start without *something* here for non-online use.
sqlalchemy.url = sqlite:///data/jhh.db


[post_write_hooks]
# Optional formatters — disabled by default to keep things hermetic.


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
