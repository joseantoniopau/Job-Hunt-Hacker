name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff lint (advisory until clean)
        run: ruff check backend/ scripts/ tests/ || true
      - name: Mypy types (advisory)
        run: mypy --ignore-missing-imports --no-strict-optional backend/ || true
      - name: Pytest with coverage
        env:
          JHH_LLM_PROVIDER: template
        run: |
          pytest -q --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=55
      - name: Smoke test
        env:
          JHH_LLM_PROVIDER: template
        run: python scripts/smoke_test.py
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
