# Project-wide tool config for Job Hunt Hacker.
#
# This file intentionally does NOT declare the project as a build target —
# packaging metadata still lives in requirements.txt / setup scripts. The
# tables below only configure ruff, mypy, and pytest.

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501", "B008"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
no_strict_optional = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
addopts = "-q"
