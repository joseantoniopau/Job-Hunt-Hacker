<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Job Hunt Hacker</title>
    <style>
      body {
        font-family: "SF Mono", Menlo, Consolas, "Courier New", monospace;
        width: 340px;
        margin: 0;
        padding: 12px;
        font-size: 12px;
        background: #fff;
        color: #000;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border: 2px solid #000;
        background: #000;
        color: #fff;
        padding: 7px 9px;
      }
      .box {
        border: 2px solid #000;
        padding: 8px 9px;
        margin-bottom: 10px;
      }
      .label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .mono {
        word-break: break-all;
        font-size: 10px;
        max-height: 48px;
        overflow: auto;
      }
      #status-line { font-weight: 700; }
      #status-line.ok::before { content: "● "; }
      #status-line.err::before { content: "○ "; }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 5px 7px;
        font-family: inherit;
        font-size: 11px;
        border: 2px solid #000;
        border-radius: 0;
        background: #fff;
        color: #000;
      }
      button {
        width: 100%;
        margin-top: 6px;
        padding: 8px 10px;
        font-family: inherit;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        background: #000;
        color: #fff;
        border: 2px solid #000;
        border-radius: 0;
        cursor: pointer;
      }
      button.secondary { background: #fff; color: #000; }
      button[disabled] { opacity: 0.45; cursor: progress; }
      a#open-app {
        display: block;
        margin-top: 6px;
        padding: 8px 10px;
        border: 2px solid #000;
        text-align: center;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #000;
        text-decoration: none;
        box-sizing: border-box;
      }
      #toast {
        margin-top: 10px;
        padding: 7px 9px;
        border: 2px solid #000;
        font-size: 11px;
        display: none;
      }
      #toast.ok, #toast.err { display: block; }
      #toast.err { background: #000; color: #fff; }
      .note { font-size: 10px; color: #333; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h1>Job Hunt Hacker</h1>

    <div class="box">
      <div class="label">Connection</div>
      <div id="status-line" class="err">checking…</div>
      <div id="status-detail" class="mono"></div>
    </div>

    <div class="box">
      <div class="label">Current page</div>
      <div id="current-url" class="mono">(loading)</div>
    </div>

    <button id="autofill-btn">Scan &amp; autofill this page</button>
    <button id="save-btn" class="secondary">Save page to vault</button>
    <a id="open-app" href="http://127.0.0.1:8731" target="_blank" rel="noopener">Open the app</a>

    <div class="box" style="margin-top:10px;">
      <div class="label">Local server</div>
      <input id="server-url" type="text" value="http://127.0.0.1:8731" />
      <button id="save-settings" class="secondary">Save server URL</button>
    </div>

    <div id="toast"></div>

    <div class="note">
      Autofill never submits anything — it only fills fields you choose,
      from your local vault. Review everything before you hit submit.
    </div>

    <script src="popup.js"></script>
  </body>
</html>
